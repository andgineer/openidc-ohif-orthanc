version: "3.9"

networks:
    cloakednet:
        name: cloakednet
 
volumes:
    postgres_data:
 
services:

    postgres:
        image: postgres:16-alpine
        volumes:
            - postgres_data:/var/lib/postgresql/data
        environment:
            POSTGRES_DB: keycloak
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: password
        healthcheck:
            test: pg_isready -d postgres
            interval: 8s
            timeout: 3s
            retries: 2
            start_period: 6s
        deploy:
            resources:
                limits:
                    memory: 256M
        networks:
            - cloakednet

    keycloak:
        image: quay.io/keycloak/keycloak:26.2
        command: ["start-dev"]
        environment:
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://postgres/keycloak
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: password
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: password
            KC_HTTP_RELATIVE_PATH: /auth
            KC_HEALTH_ENABLED: "true"
        healthcheck:
            test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 15
            start_period: 60s
        ports:
            - 3333:8080
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - cloakednet

    viewer:
        build:
            context: ./docker/ohif
        image: ohif-openresty
        env_file: openid-keycloak-secrets.env
        volumes:
            - ./docker/ohif/ohif.js:/var/www/html/app-config.js:ro
            - ./docker/ohif/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
            - ./volumes/logs/nginx:/var/logs/nginx
        depends_on:
            keycloak:
                condition: service_healthy
            orthanc:
                condition: service_started
        restart: always
        ports:
            - '80:80'
        networks:
            - cloakednet

    orthanc:
        image: orthancteam/orthanc:26.1.0
        hostname: orthanc
        volumes:
            - ./docker/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
            - ./volumes/orthanc-db/:/var/lib/orthanc/db/
        restart: unless-stopped
        networks:
            - cloakednet

